root: true

exclude:
  - "**/testdata/**"
  - .git
  - docs/**
  - examples/**
  - internal/rules/quality
  - internal/rules/ci
  - .github/scripts

rules:
  max-depth:
    max: 5

  max-files-in-dir:
    max: 40

  max-subdirs:
    max: 20

  file-existence:
    "README.md": "exists:1"

  disallowed-patterns:
    - "*.tmp"
    - "*.bak"
    - ".DS_Store"
    # README.md required everywhere; other .md only allowed under docs/ or root.
    - "internal/**/*.md"
    - "cmd/**/*.md"
    - "examples/**/*.md"
    - "!**/README.md"

  test-adjacency:
    pattern: "adjacent"
    file-patterns:
      - "**/*.go"
    exemptions:
      - "cmd/**/*.go"
      - "**/*_gen.go"
      - "**/*.py"
      - "internal/clones/**/*.go"
      - "internal/autofix/*.go"
      - "internal/config/*.go"
      - "internal/linter/*.go"
      - "internal/output/*.go"
      - "internal/parser/*.go"
      - "internal/plugin/*.go"
      - "internal/tui/*.go"
      - "internal/scaffold/*.go"
      - "internal/init/*.go"
      - "internal/lang/*.go"
      - "internal/graph/*.go"
      - "internal/graph/analysis/*.go"
      - "internal/graph/export/*.go"
      - "internal/metrics/*.go"
      - "internal/walker/*.go"
      - "internal/rules/*.go"
      - "internal/rules/graph/*.go"
      - "internal/rules/structure/*.go"
      - "internal/rules/test/*.go"
      - "internal/rules/predicate/*.go"
      - "internal/parser/treesitter/*.go"
      - "internal/rules/ci/*.go"
      - "internal/rules/ci/core/*.go"
      - "internal/rules/ci/strategies/*.go"
      - "internal/ptest/*.go"
      - "fuzz/*.go"

  test-location:
    integration-test-dir: "tests"
    allow-adjacent: true
    file-patterns:
      - "**/*_test.go"
    exemptions:
      - "testdata/**"
      - "tests/**/*.py"
      - "**/*_bench_test.go"
      - "internal/linter/init_test.go"
      - "internal/rules/structure/enhanced_violations_test.go"
      - "internal/rules/structure/language_aware_naming_test.go"
      - "internal/autofix/autofix_coverage_test.go"
      - "internal/autofix/engine_coverage_test.go"
      - "internal/graph/export/export_coverage_test.go"
      - "internal/init/detector_coverage_test.go"
      - "internal/lang/detector_coverage_test.go"
      - "internal/linter/factory_coverage_test.go"
      - "internal/linter/pbt_test.go"
      - "internal/metrics/cognitive_extra_test.go"
      - "internal/plugin/plugin_coverage2_test.go"
      - "internal/plugin/plugin_coverage_test.go"
      - "internal/rules/ci/integration_test.go"
      - "internal/rules/graph/graph_coverage_test.go"
      - "internal/rules/structure/coverage_fill_test.go"
      - "internal/rules/structure/deep_coverage_test.go"
      - "internal/walker/walker_coverage_test.go"
      - "internal/ptest/**"
      - "fuzz/**"

  disallow-import-cycles: true

layers:
  - name: cmd
    path: cmd/**
    dependsOn: [internal]

  - name: internal
    path: internal/**
    dependsOn: []

entrypoints:
  - cmd/structurelint/main.go
  - "**/*_test.go"
