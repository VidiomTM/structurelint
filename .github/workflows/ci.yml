name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run tests with branch coverage
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.out $(go list ./... | grep -v 'internal/parser/treesitter') 2>&1 | tee test.log

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ runner.os }}
          path: test.log
          retention-days: 7

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{gsub(/%/, "", $3); print $3}')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 90)}"; then
            echo "Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

  complexity:
    name: Check Complexity
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        run: |
          # Allow up to complexity 17 (current max is 16)
          gocyclo -over 26 . 2>&1 | tee complexity.log
          echo "Complexity check complete"

      - name: Upload complexity logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: complexity-logs-${{ runner.os }}
          path: complexity.log
          retention-days: 7

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build
        run: |
          go build -v ./cmd/structurelint 2>&1 | tee build.log

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.os }}
          path: build.log
          retention-days: 7

      - name: Run structurelint on itself
        run: |
          go run ./cmd/structurelint . 2>&1 | tee structurelint-self-check.log
        if: runner.os != 'Windows'

      - name: Run structurelint on itself (Windows)
        id: structurelint_windows_selfcheck
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          go run ./cmd/structurelint . 2>&1 | Tee-Object -FilePath structurelint-self-check.log
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true

      - name: Upload self-check logs on failure
        if: steps.structurelint_windows_selfcheck.outcome == 'failure' || failure()
        uses: actions/upload-artifact@v7
        with:
          name: self-check-logs-${{ matrix.os }}
          path: structurelint-self-check.log
          retention-days: 7

  pbt:
    name: Property Tests (rapid)
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run property tests
        run: go test ./internal/ptest/ -v -count=1 -rapid.checks=1000

  fuzz-smoke:
    name: Fuzz Smoke Tests
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Fuzz smoke test — FuzzParse
        run: go test ./fuzz/ -fuzz=^FuzzParse$ -fuzztime=30s

      - name: Fuzz smoke test — FuzzLintRule
        run: go test ./fuzz/ -fuzz=^FuzzLintRule$ -fuzztime=30s

      - name: Fuzz smoke test — FuzzJSONOutput
        run: go test ./fuzz/ -fuzz=^FuzzJSONOutput$ -fuzztime=30s

  # NOTE: Mutation testing via go-mutesting is NOT compatible with Go 1.26 (StdSizes nil pointer).
  # Re-enable when go-mutesting is updated or switch to a maintained alternative.

  self-lint:
    name: Self-Lint (Dogfooding)
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build structurelint
        run: |
          go build -o structurelint ./cmd/structurelint 2>&1 | tee self-lint-build.log

      - name: Run structurelint on itself
        run: |
          ./structurelint . 2>&1 | tee self-lint-run.log

      - name: Verify no violations
        run: |
          if ./structurelint . | tee self-lint-verify.log | grep -q "violation"; then
            echo "structurelint found violations in its own codebase!"
            exit 1
          fi
          echo "✓ structurelint passes its own checks"

      - name: Upload self-lint logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: self-lint-logs-${{ runner.os }}
          path: |
            self-lint-build.log
            self-lint-run.log
            self-lint-verify.log
          retention-days: 7
