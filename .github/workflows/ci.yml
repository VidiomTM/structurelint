name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with branch coverage
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.out ./... 2>&1 | tee test.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1
          if-no-files-found: error

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ runner.os }}
          path: test.log
          retention-days: 7

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{gsub(/%/, "", $3); print $3}')
          echo "Total coverage: ${COVERAGE}%"
          # TODO: Raise to 90% once internal/parser (tree-sitter CGo, 37.3%),
          # internal/config (file I/O, 50.6%), internal/init (65.5%),
          # internal/rules/structure (68.7%), and cmd/structurelint (0%) have proper tests.
          if awk "BEGIN {exit !($COVERAGE < 58)}"; then
            echo "Coverage ${COVERAGE}% is below 58% threshold"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: .
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  lint:
    name: Lint
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.1.0
          golangci-lint run --timeout=5m 2>&1 | tee lint.log

      - name: Upload lint logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-logs-${{ runner.os }}
          path: lint.log
          retention-days: 7

  complexity:
    name: Check Complexity
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        run: |
          # Allow up to complexity 17 (current max is 16)
          gocyclo -over 26 . 2>&1 | tee complexity.log
          echo "Complexity check complete"

      - name: Upload complexity logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: complexity-logs-${{ runner.os }}
          path: complexity.log
          retention-days: 7

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build
        run: |
          go build -v ./cmd/structurelint 2>&1 | tee build.log

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.os }}
          path: build.log
          retention-days: 7

      - name: Run structurelint on itself
        run: |
          go run ./cmd/structurelint . 2>&1 | tee structurelint-self-check.log
        if: runner.os != 'Windows'

      - name: Run structurelint on itself (Windows)
        run: |
          go run ./cmd/structurelint . 2>&1 | Tee-Object -FilePath structurelint-self-check.log
        if: runner.os == 'Windows'
        shell: pwsh

      - name: Upload self-check logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: self-check-logs-${{ matrix.os }}
          path: structurelint-self-check.log
          retention-days: 7

  pbt:
    name: Property Tests (rapid)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Fuzz smoke test — FuzzParse
        run: go test ./fuzz/ -fuzz=FuzzParse -fuzztime=30s

      - name: Fuzz smoke test — FuzzLintRule
        run: go test ./fuzz/ -fuzz=FuzzLintRule -fuzztime=30s

      - name: Fuzz smoke test — FuzzJSONOutput
        run: go test ./fuzz/ -fuzz=FuzzJSONOutput -fuzztime=30s

  # NOTE: Mutation testing via go-mutesting is NOT compatible with Go 1.26 (StdSizes nil pointer).
  # Re-enable when go-mutesting is updated or switch to a maintained alternative.

  self-lint:
    name: Self-Lint (Dogfooding)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build structurelint
        run: |
          go build -o structurelint ./cmd/structurelint 2>&1 | tee self-lint-build.log

      - name: Run structurelint on itself
        run: |
          ./structurelint . 2>&1 | tee self-lint-run.log

      - name: Verify no violations
        run: |
          if ./structurelint . | tee self-lint-verify.log | grep -q "violation"; then
            echo "structurelint found violations in its own codebase!"
            exit 1
          fi
          echo "✓ structurelint passes its own checks"

      - name: Upload self-lint logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: self-lint-logs-${{ runner.os }}
          path: |
            self-lint-build.log
            self-lint-run.log
            self-lint-verify.log
          retention-days: 7
